services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: connect-rpc-todo-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://todo:todo@db:5432/todo?sslmode=disable
    volumes:
      - .:/app
      - go-pkg-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    depends_on:
      - db

volumes:
  db-data:
  go-pkg-cache:
  go-build-cache:
