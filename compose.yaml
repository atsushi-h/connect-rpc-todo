services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build:
      context: .          # ルートをコンテキストに（go.work, gen/go が必要）
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://todo:todo@db:5432/todo?sslmode=disable
    depends_on:
      - db

volumes:
  db-data:
